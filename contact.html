<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="hero-shape"></div>
    <h1>Contact Me</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <section class="card">
      <h2>Get in Touch</h2>
      <p>If you’d like to reach out about this project, fill in the form below. When you click “Save to File,” your details will be downloaded into a text file.</p>
      
      <form id="contactForm">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="message">Message:</label><br>
        <textarea id="message" name="message" required></textarea><br><br>

        <button type="button" onclick="saveContactInfo()">Save to File</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Justin Huynh</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
