<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CentralBox - School Canteen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-top">
            <div class="logo">🍎 <span>CentralBox</span></div>
            <div class="menu-icon">☰</div>
        </div>
        <div class="school-name">Northside Elementary</div>
    </header>

    <main id="app-container">
        <section id="menu-screen" class="screen active">
            <div class="welcome-section">
                <h1>Welcome, Sam!</h1>
                <div class="search-bar">
                    <input type="text" placeholder="Search menu...">
                </div>
            </div>

            <div class="categories">
                <button class="cat-btn active">All</button>
                <button class="cat-btn">Hot Food</button>
                <button class="cat-btn">Drinks</button>
                <button class="cat-btn">Snacks</button>
            </div>

            <div id="food-list" class="food-list">
                </div>

            <div class="cart-preview">
                <span>Total: $<span id="cart-total-preview">0.00</span></span>
                <button onclick="navigateTo('checkout-screen')">View Cart</button>
            </div>
        </section>

        <section id="checkout-screen" class="screen">
            <h2 class="section-title">Checkout</h2>
            
            <div class="form-group">
                <label>Pickup Time</label>
                <select id="pickup-time">
                    <option>10:30 AM (Recess)</option>
                    <option>12:30 PM (Lunch)</option>
                </select>
            </div>

            <div class="selected-items-box">
                <h3>Selected Items</h3>
                <div id="checkout-items-list"></div>
            </div>

            <div class="form-group">
                <label>Allergies / Notes</label>
                <textarea id="allergy-notes" placeholder="e.g. No nuts, extra napkins"></textarea>
            </div>

            <div class="payment-box">
                <div class="total-row">
                    <span>Total:</span>
                    <span>$<span id="checkout-total">0.00</span></span>
                </div>
                <p class="parent-note">⚠️ Requires Parent Approval</p>
                <button class="pay-btn" onclick="processPayment()">Pay Now</button>
            </div>
        </section>

        <section id="orders-screen" class="screen">
            <div class="tab-system">
                <button class="tab-btn active">Upcoming</button>
                <button class="tab-btn">Past Orders</button>
            </div>

            <div id="upcoming-orders">
                <p class="empty-msg">No active orders.</p>
            </div>

            <h3 class="history-title">Order History</h3>
            <div class="history-list">
                <div class="history-card">
                    <div class="history-date">May 15, 2026</div>
                    <div class="history-details">1x Chicken Wrap, 1x Apple Juice</div>
                    <div class="history-price">$8.50</div>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="navigateTo('menu-screen')">
            <span>🏠</span>
            <p>Menu</p>
        </div>
        <div class="nav-item" onclick="navigateTo('checkout-screen')">
            <span>🛒</span>
            <p>Orders</p>
        </div>
        <div class="nav-item" onclick="navigateTo('orders-screen')">
            <span>👤</span>
            <p>Account</p>
        </div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
