<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CentralBox | Canley Vale High School</title>
    
    <style>
        :root {
            --primary: #8a939b;
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #777777;
            --border: #e0e0e0;
            --accent: #5cb85c;
            --danger: #d9534f;
        }

        * { box-sizing: border-box; font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        body { background-color: #e9ecef; display: flex; justify-content: center; height: 100vh; }

        #app-container {
            width: 100%;
            max-width: 1200px;
            height: 100%;
            background-color: var(--bg-color);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; font-weight: bold; font-size: 1.2rem; }
        .logo-img { height: 40px; width: auto; max-width: 120px; object-fit: contain; }

        main { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .view { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .school-label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; }
        h2 { margin-bottom: 20px; font-size: 1.8rem; color: var(--text-main); }

        .search-container { position: relative; margin-bottom: 20px; max-width: 500px; }
        .search-container input {
            width: 100%;
            padding: 14px 14px 14px 45px; 
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--card-bg);
            font-size: 1rem;
        }
        .search-container::before { 
            content: "🔍"; 
            position: absolute; 
            left: 15px; 
            top: 50%; 
            transform: translateY(-50%); 
            font-size: 1.1rem;
            z-index: 1;
        }

        .chip-container { display: flex; gap: 10px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px; }
        .chip {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background: #eef1f5;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }
        .chip.active { background: var(--primary); color: white; }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            margin-bottom: 15px;
        }

        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .nav-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 75px;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            width: 33%;
        }
        .nav-item.active { color: var(--text-main); font-weight: bold; }
        .nav-icon { font-size: 1.5rem; margin-bottom: 4px; }

        .qty-badge { background: var(--primary); color: white; padding: 2px 8px; border-radius: 5px; font-size: 0.8rem; margin-left: 10px; }
    </style>
</head>
<body>

    <div id="app-container">
        <header>
            <div class="logo-area">
                <img src="0.png" alt="CVHS Logo" class="logo-img">
                <span>CentralBox</span>
            </div>
            <div style="font-size: 1.5rem; cursor: pointer;">☰</div>
        </header>

        <main id="content">
            <section id="view-menu" class="view active">
                <p class="school-label">Canley Vale High School</p>
                <h2>Welcome, <span id="display-name">Sam</span>!</h2>
                
                <div class="search-container">
                    <input type="text" id="menu-search" placeholder="Search menu..." oninput="filterMenu()">
                </div>

                <div class="chip-container">
                    <button class="chip active" onclick="setCategory('Food', this)">Food</button>
                    <button class="chip" onclick="setCategory('Hot Food', this)">Hot Food</button>
                    <button class="chip" onclick="setCategory('Drinks', this)">Drinks</button>
                    <button class="chip" onclick="setCategory('Snacks', this)">Snacks</button>
                </div>

                <div id="menu-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px;"></div>
                
                <div style="background:#f0f2f5; padding:20px; border-radius:15px; display:flex; justify-content:space-between; align-items:center; margin-top:20px;">
                    <div>Total: <strong>$<span id="menu-total">0.00</span></strong></div>
                    <button class="btn-action" style="width:auto;" onclick="showCheckout()">View Cart</button>
                </div>
            </section>

            <section id="view-checkout" class="view">
                <p class="school-label">Canley Vale High School</p>
                <h2>Checkout</h2>
                <div id="cart-list"></div>
                <div style="margin-top: 20px; max-width: 500px;">
                    <label>Pickup Time</label>
                    <select id="pickup-time" style="width:100%; padding:12px; margin-top:5px; border-radius:8px; border:1px solid var(--border);">
                        <option value="">Select Time</option>
                        <option value="Recess">Recess (10:15 AM)</option>
                        <option value="Lunch">Lunch (1:25 PM)</option>
                    </select>
                    <h2 style="margin-top: 20px;">Total: <span id="checkout-total">$0.00</span></h2>
                    <button class="btn-action" style="margin-top: 10px;" onclick="placeOrder()">Confirm Order</button>
                </div>
            </section>

            <section id="view-orders" class="view">
                <p class="school-label">Canley Vale High School</p>
                <h2>My Orders</h2>
                <div id="order-history">
                    <p id="empty-order-msg" style="text-align: center; color: var(--text-muted); margin-top: 40px;">No active orders.</p>
                </div>
            </section>

            <section id="view-account" class="view">
                <p class="school-label">Student Profile</p>
                <div class="card">
                    <h3>Personal Information</h3>
                    <div style="margin-bottom:15px;">
                        <label style="display:block; font-size:0.9rem; margin-bottom:5px;">First Name</label>
                        <input type="text" id="input-first-name" value="Sam" style="width:100%; padding:10px; border-radius:5px; border:1px solid var(--border);">
                    </div>
                    <button class="btn-action" onclick="saveAccountChanges()">Save Changes</button>
                </div>
            </section>
        </main>

        <nav class="nav-bar">
            <button class="nav-item active" id="nav-menu" onclick="switchTab('view-menu')">
                <span class="nav-icon">🏠</span><span>Menu</span>
            </button>
            <button class="nav-item" id="nav-orders" onclick="switchTab('view-orders')">
                <span class="nav-icon">🧾</span><span>Orders</span>
            </button>
            <button class="nav-item" id="nav-account" onclick="switchTab('view-account')">
                <span class="nav-icon">👤</span><span>Account</span>
            </button>
        </nav>
    </div>

    <script>
        const menuData = [
            // FOOD (REGULAR)
            { id: 1, name: "California Roll Tray", price: 8.50, cat: "Food" },
            { id: 2, name: "Salmon Sashimi Tray", price: 10.00, cat: "Food" },
            { id: 3, name: "Tuna, Egg & Mayo Sandwich", price: 6.50, cat: "Food" },
            { id: 4, name: "Caesar Pasta Salad", price: 6.50, cat: "Food" },
            { id: 5, name: "Caesar Wrap", price: 8.50, cat: "Food" },

            // HOT FOOD
            { id: 6, name: "Greek Chicken Gyro", price: 7.50, cat: "Hot Food" },
            { id: 7, name: "Cup Noodles", price: 4.50, cat: "Hot Food" },
            { id: 8, name: "Spicy Cup Noodles", price: 5.00, cat: "Hot Food" },
            { id: 9, name: "Hotdog", price: 5.50, cat: "Hot Food" },
            { id: 10, name: "Caesar Burger", price: 8.50, cat: "Hot Food" },
            { id: 11, name: "Cheese Burger", price: 6.50, cat: "Hot Food" },

            // DRINKS
            { id: 12, name: "Solo", price: 3.50, cat: "Drinks" },
            { id: 13, name: "Pepsi Max", price: 3.50, cat: "Drinks" },
            { id: 14, name: "Sunkist", price: 3.50, cat: "Drinks" },
            { id: 15, name: "Water", price: 2.50, cat: "Drinks" },
            { id: 16, name: "Chocolate Milk", price: 3.50, cat: "Drinks" },
            { id: 17, name: "Strawberry Milk", price: 3.50, cat: "Drinks" },

            // SNACKS
            { id: 18, name: "Snap Barbeque Flavour", price: 3.50, cat: "Snacks" },
            { id: 19, name: "Zooper Dooper", price: 1.00, cat: "Snacks" },
            { id: 20, name: "Frozen Jelly Sticks", price: 0.50, cat: "Snacks" }
        ];

        let cart = {};
        let currentCategory = 'Food';

        function setCategory(category, el) {
            currentCategory = category;
            document.querySelectorAll('.chip').forEach(chip => chip.classList.remove('active'));
            el.classList.add('active');
            filterMenu();
        }

        function filterMenu() {
            const searchTerm = document.getElementById('menu-search').value.toLowerCase();
            const filtered = menuData.filter(item => {
                const matchesCat = item.cat === currentCategory;
                const matchesSearch = item.name.toLowerCase().includes(searchTerm);
                return matchesCat && matchesSearch;
            });
            renderMenu(filtered);
        }

        function renderMenu(items = menuData) {
            const list = document.getElementById('menu-list');
            list.innerHTML = items.map(item => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:15px; margin-bottom:0;">
                    <div>
                        <h4>${item.name}</h4>
                        <p>$${item.price.toFixed(2)}</p>
                    </div>
                    <button class="btn-action" style="width:auto; padding:8px 15px; font-size:0.8rem;" onclick="addToCart(${item.id})">+ Add</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            cart[id] = (cart[id] || 0) + 1;
            updateTotal();
        }

        function updateTotal() {
            let total = 0;
            for (let id in cart) {
                const item = menuData.find(p => p.id == id);
                total += item.price * cart[id];
            }
            document.getElementById('menu-total').innerText = total.toFixed(2);
        }

        function showCheckout() {
            const ids = Object.keys(cart);
            if (ids.length === 0) return alert("Your cart is empty!");
            const cartList = document.getElementById('cart-list');
            cartList.innerHTML = ids.map(id => {
                const item = menuData.find(p => p.id == id);
                return `<div class="card" style="display:flex; justify-content:space-between; padding:10px; margin-bottom:5px;">
                    <span>${item.name} <span class="qty-badge">x${cart[id]}</span></span>
                    <strong>$${(item.price * cart[id]).toFixed(2)}</strong>
                </div>`;
            }).join('');
            let total = 0;
            ids.forEach(id => total += menuData.find(p => p.id == id).price * cart[id]);
            document.getElementById('checkout-total').innerText = `$${total.toFixed(2)}`;
            switchTab('view-checkout');
        }

        function placeOrder() {
            const time = document.getElementById('pickup-time').value;
            if (!time) return alert("Select a pickup time!");
            const orderList = document.getElementById('order-history');
            document.getElementById('empty-order-msg').style.display = 'none';
            const orderHtml = `<div class="card" style="border-left: 5px solid var(--accent);"><strong>${time} Order</strong><p>Status: Preparing</p></div>`;
            orderList.insertAdjacentHTML('afterbegin', orderHtml);
            cart = {};
            document.getElementById('menu-total').innerText = "0.00";
            alert("Order placed!");
            switchTab('view-orders');
        }

        function switchTab(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const tabName = viewId.split('-')[1];
            if(document.getElementById('nav-' + tabName)) document.getElementById('nav-' + tabName).classList.add('active');
        }

        function saveAccountChanges() {
            const first = document.getElementById('input-first-name').value.trim();
            if(first) {
                document.getElementById('display-name').innerText = first;
                alert("Name Updated!");
                switchTab('view-menu');
            }
        }

        filterMenu();
    </script>
</body>
</html>
