<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CentralBox</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app-container">
        
        <header>
            <div class="logo">🍎 CentralBox</div>
            <div class="menu-icon">☰</div>
        </header>

        <main>
            <section id="view-menu" class="view active">
                <div class="school-name">Canley Vale High School</div>
                <h2>Welcome, Sam!</h2>
                
                <div class="search-bar">
                    <input type="text" placeholder="🔍 Search menu">
                </div>
                
                <div class="categories">
                    <button class="active">All</button>
                    <button>Hot Food</button>
                    <button>Drinks</button>
                    <button>></button>
                </div>

                <div id="menu-items" class="item-list">
                    </div>

                <div class="cart-summary">
                    <span>Total: $<span id="cart-total-menu">0.00</span></span>
                    <button onclick="goToCheckout()" class="btn-primary">View Cart</button>
                </div>
            </section>

            <section id="view-checkout" class="view">
                <div class="school-name">Canley Vale High School</div>
                <h2>Checkout</h2>
                
                <select id="pickup-time" class="dropdown">
                    <option>Select Pickup Time</option>
                    <option>Recess (10:30 AM)</option>
                    <option>Lunch (12:30 PM)</option>
                </select>

                <h3>Selected Items</h3>
                <div id="checkout-items" class="item-list">
                    </div>

                <h3>Allergies</h3>
                <textarea placeholder="Please note any allergies here..."></textarea>

                <div class="checkout-footer">
                    <div class="total-row">
                        <span>Total:</span>
                        <h2>$<span id="cart-total-checkout">0.00</span></h2>
                    </div>
                    <button class="btn-primary full-width" onclick="payNow()">Pay Now</button>
                </div>
            </section>

            <section id="view-orders" class="view">
                <div class="school-name">Canley Vale High School</div>
                
                <div class="order-tabs">
                    <button class="active">Upcoming</button>
                    <button>Past Orders</button>
                </div>

                <div id="upcoming-orders" class="orders-list">
                    <p class="empty-state">No upcoming orders. Go to the menu to place one!</p>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn active" onclick="switchView('view-menu', this)">
                <div class="icon">🏠</div>Menu
            </button>
            <button class="nav-btn" onclick="switchView('view-orders', this)">
                <div class="icon">🧾</div>Orders
            </button>
            <button class="nav-btn">
                <div class="icon">👤</div>Account
            </button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
